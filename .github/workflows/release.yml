name: Build & Release CodeWhisper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install renderer deps
        run: npm install --legacy-peer-deps
        working-directory: renderer

      - name: Build renderer
        run: npm run build
        working-directory: renderer
        env:
          CI: false
          GENERATE_SOURCEMAP: false
          REACT_APP_GEMINI_KEY: ${{ secrets.REACT_APP_GEMINI_KEY }}

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
          if-no-files-found: warn

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install renderer deps
        run: npm install --legacy-peer-deps
        working-directory: renderer

      - name: Build renderer
        run: npm run build
        working-directory: renderer
        env:
          CI: false
          GENERATE_SOURCEMAP: false
          REACT_APP_GEMINI_KEY: ${{ secrets.REACT_APP_GEMINI_KEY }}

      - name: Build macOS dmg
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg
          if-no-files-found: warn

  # ── Linux ─────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse \
            libfuse2

      - name: Install root deps
        run: npm install

      - name: Install renderer deps
        run: npm install --legacy-peer-deps
        working-directory: renderer

      - name: Build renderer
        run: npm run build
        working-directory: renderer
        env:
          CI: false
          GENERATE_SOURCEMAP: false
          REACT_APP_GEMINI_KEY: ${{ secrets.REACT_APP_GEMINI_KEY }}

      - name: Build Linux AppImage
        run: npx electron-builder --linux AppImage --publish never
        env:
          USE_SYSTEM_FPM: true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage
          if-no-files-found: warn

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: always() && (needs.build-windows.result == 'success' || needs.build-mac.result == 'success' || needs.build-linux.result == 'success')
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-files
        continue-on-error: true

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: release-files
        continue-on-error: true

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release-files
        continue-on-error: true

      - name: List release files
        run: ls -la release-files/ || echo "No files found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CodeWhisper ${{ github.ref_name }}"
          body: |
            ## 🪄 CodeWhisper ${{ github.ref_name }}

            AI-powered coding assistant — free desktop app for Windows, macOS, and Linux.

            ### What's New
            - 🏗 AI Project Builder — generate full projects from a prompt
            - ⚡ Credit system (100 free credits/month)
            - 🔐 Login / Signup in the app
            - 🐛 Bug scanner & auto-fix
            - 🗺 Project map visualization

            ### Download
            | Platform | File |
            |----------|------|
            | 🖥 Windows | `CodeWhisper Setup *.exe` |
            | 🍎 macOS | `CodeWhisper-*.dmg` |
            | 🐧 Linux | `CodeWhisper-*.AppImage` |
          draft: false
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
