<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="dots" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Chat bubble body -->
  <rect x="8" y="8" width="72" height="52" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Chat bubble tail -->
  <path d="M28 60 L22 76 L42 64 Z" fill="url(#bg)"/>

  <!-- Code symbol </> -->
  <!-- < -->
  <polyline points="28,28 20,34 28,40" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / -->
  <line x1="40" y1="22" x2="48" y2="46" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- > -->
  <polyline points="60,28 68,34 60,40" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decorative dots -->
  <circle cx="86" cy="18" r="4" fill="#06b6d4" opacity="0.9"/>
  <circle cx="78" cy="10" r="3" fill="#3b82f6" opacity="0.8"/>
  <circle cx="92" cy="30" r="2.5" fill="#a855f7" opacity="0.7"/>
  <circle cx="82" cy="62" r="4" fill="#7c3aed" opacity="0.8"/>
  <circle cx="90" cy="52" r="2.5" fill="#a855f7" opacity="0.6"/>
</svg>
